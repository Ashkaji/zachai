name: frontend-quality

on:
  pull_request:
    paths:
      - 'src/frontend/**'
      - '.github/workflows/test.yml'
  push:
    branches: [main, master]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

env:
  FRONTEND_DIR: src/frontend
  PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
  PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
  GITHUB_SHA: ${{ github.sha }}
  GITHUB_BRANCH: ${{ github.head_ref || github.ref_name }}

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: src/frontend/.nvmrc
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build type check
        run: npm run build

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: src/frontend/.nvmrc
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Unit tests
        run: npm test
      - name: E2E shard
        run: npx playwright test --shard=${{ matrix.shard }}/2
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.shard }}
          path: |
            src/frontend/playwright-report/
            src/frontend/test-results/
          retention-days: 30

  contract-test:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: src/frontend/.nvmrc
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run consumer contract tests
        run: npm run test:pact:consumer
      - name: Publish pacts
        if: github.event_name == 'pull_request' || github.ref_name == 'main' || github.ref_name == 'master'
        run: npm run publish:pact
      - name: Can-I-Deploy gate
        if: github.event_name == 'pull_request' || github.ref_name == 'main' || github.ref_name == 'master'
        run: npm run can:i:deploy:consumer

  burn-in:
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: src/frontend/.nvmrc
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Burn-in loop
        run: bash ../scripts/burn-in.sh
      - name: Upload burn-in artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-artifacts
          path: |
            src/frontend/playwright-report/
            src/frontend/test-results/
          retention-days: 30

  report:
    needs: [test, contract-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Quality gate summary
        run: |
          echo "P0 tests must be 100% passing."
          echo "P1 pass-rate target: >=95%."
          echo "Trigger Slack notification with webhook if configured."

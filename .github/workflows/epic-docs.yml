# Ensures docs/epics-and-stories.md matches sprint-status after generate, and sprint matches epics.md.
name: Epic docs sync

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify epic docs (generate + diff + check)
        run: python3 scripts/sync_epic_docs.py ci-verify

# Validates BMAD sprint tracking against planning epics (see scripts/sync_epic_docs.py).
name: Epic docs sync

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check sprint-status vs epics.md
        run: python3 scripts/sync_epic_docs.py check

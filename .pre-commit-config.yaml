# https://pre-commit.com (optional — default is scripts/install-git-hooks.sh + core.hooksPath)
# pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: sync-epic-docs
        name: sync epic docs (generate + check + git add)
        entry: python3 scripts/sync_epic_docs.py pre-commit
        language: system
        pass_filenames: false

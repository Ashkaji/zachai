# Optional OpenVINO Whisper **host bind mount** (Story 3.2 / 3.3 fallback).
#
# Default `compose.yml` does **not** mount a host model path so `docker compose up` works on
# Windows Docker Desktop when non-C: drives fail with:
#   mkdir /run/desktop/mnt/host/d: file exists
#
# Prefer production path: seed MinIO `models/latest` + IR objects under the version prefix (no bind).
#
# When you need a local IR tree instead, from `src/` run:
#   docker compose -f compose.yml -f compose.openvino-local-model.yml up -d openvino-worker
#
# Set in `.env` (use a path on C: if D: bind mounts fail):
#   WHISPER_MODEL_HOST_PATH=C:/zachai-models/whisper-base-ov
#   WHISPER_MODEL_PATH=/models/whisper-base-ov

services:
  openvino-worker:
    environment:
      WHISPER_MODEL_PATH: ${WHISPER_MODEL_PATH:-/models/whisper-base-ov}
    volumes:
      - ${WHISPER_MODEL_HOST_PATH:?Set WHISPER_MODEL_HOST_PATH to the host directory containing the OpenVINO Whisper export (see compose.openvino-local-model.yml)}:/models/whisper-base-ov:ro

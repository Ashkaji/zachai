# ZachAI — Compose Stack (100% Open-Source, On-Premise)
# ======================================================
# Full startup chain (architecture.md § 6):
#   Layer 0 — Storage:    minio → (minio-init)
#   Layer 1 — Identity:   postgres → keycloak, redis          [TODO: Story 1.2, 5.2]
#   Layer 2 — Compute:    ffmpeg-worker, openvino, camunda7    [TODO: Story 3.1, 3.2, 2.2]
#   Layer 3 — Gateway:    fastapi, camunda-workers             [TODO: Story 1.3, 2.2]
#   Layer 4 — Annotation: label-studio                        [TODO: Story 2.1]
#   Layer 5 — Collab:     hocuspocus, languagetool, export-worker [TODO: Story 5.x]
#   Layer 6 — Frontend:   frontend                            [TODO: Story (React)]
#
# SMOKE TEST — run after 'docker compose up -d':
#   docker compose logs -f minio-init          # wait for "Buckets initialized"
#   docker compose exec minio mc alias set local http://localhost:9000 minioadmin minioadmin
#   docker compose exec minio mc ls local/
#   Expected: [date] projects/  golden-set/  models/  snapshots/
#
# Interfaces after startup:
#   MinIO S3 API:      http://localhost:9000
#   MinIO Console:     http://localhost:9001
#   (future services listed as they are added in subsequent stories)

networks:
  zachai-network:
    driver: bridge

volumes:
  minio_data:
  postgres_data:        # Story 1.2 — shared PostgreSQL instance (keycloak + zachai + camunda DBs)
  # redis_data:         # TODO: Story 5.2 (Hocuspocus + WSS tickets)

services:

  # ── Layer 0: Storage Foundation (Story 1.1) ──────────────────────────────────
  #
  # MinIO is the root of the entire stack — every other service depends on it.
  # It has zero dependencies and starts first. The minio-init service creates
  # the 4 required root buckets once MinIO is healthy.

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    # NOTE: Verify this tag at https://hub.docker.com/r/minio/minio/tags
    # before first deployment and update to the latest stable RELEASE.
    container_name: zachai-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API — used by FastAPI presigned URLs, FFmpeg, OpenVINO
      - "9001:9001"    # Web Console — http://localhost:9001 (dev/ops access)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - zachai-network
    healthcheck:
      test: ["CMD", "/usr/bin/mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: zachai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - zachai-network
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/projects
        mc mb --ignore-existing local/golden-set
        mc mb --ignore-existing local/models
        mc mb --ignore-existing local/snapshots
        echo "✅ Buckets initialized: projects, golden-set, models, snapshots"
    restart: "no"

  # ── Layer 1: Identity & Persistence ──────────────────────────────────────────
  #
  # PostgreSQL is the shared database instance. Three dedicated databases:
  #   - keycloak  : IAM data (created by POSTGRES_DB env var — automatic)
  #   - zachai    : Business model data (created by init.sql — Story 1.2)
  #   - camunda   : Workflow engine data (TODO: Story 2.2 — activate in init.sql)
  # Keycloak depends on postgres (service_healthy).

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: zachai-postgres:16.4-local
    container_name: zachai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: keycloak    # primary DB — keycloak IAM data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zachai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB:-keycloak}\""]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile
    image: zachai-keycloak:26.1.4-local
    # NOTE: Verify base tag in docker/keycloak/Dockerfile at
    # https://quay.io/repository/keycloak/keycloak?tab=tags before first deployment.
    container_name: zachai-keycloak
    command: start-dev --import-realm
    # start-dev: disables HTTPS enforcement — suitable for on-premise Docker Compose.
    # --import-realm: imports JSON files from /opt/keycloak/data/import/ at startup.
    #                 Skips silently if realm already exists (idempotent).
    ports:
      - "8180:8080"    # Keycloak admin UI + OIDC — http://localhost:8180
      - "9002:9000"    # Keycloak management — http://localhost:9002/health (AC #2 compliance)
      #                  NOTE: Port 9000 is reserved for MinIO S3 API.
    environment:
      # Admin bootstrap credentials (one-time — ignored if admin already exists)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      # Database — connects to the 'keycloak' database in the shared postgres instance
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # HTTP / hostname (dev mode — no HTTPS enforcement)
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # Enable /health/ready endpoint on management port 9000
      KC_HEALTH_ENABLED: "true"
    networks:
      - zachai-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 26.x health endpoint is on management port 9000 (not 8080).
      # The UBI8 micro base image has NO curl or wget — use bash /dev/tcp instead.
      # start_period: 90s — Keycloak needs time for PostgreSQL schema migration on first run.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # redis:          # TODO: Story 5.2 — WSS short-lived tickets (TTL 60s) + LanguageTool cache.
  #                 #                   Image: redis:7-alpine. Port: 6379. Depends on: (none).

  # ── Layer 3: Gateway & Orchestration ─────────────────────────────────────────
  #
  # FastAPI is the lean control plane. In this story (1.3) it provides:
  #   - JWT verification via Keycloak JWKS
  #   - Presigned PUT URL generation (Manager role → browser uploads directly to MinIO)
  #   - Presigned GET URL generation (any authenticated role)
  # Future stories will add: WSS tickets (Story 5.2), Golden Set counter (Story 4.x).

  fastapi:
    build:
      context: .
      dockerfile: api/fastapi/Dockerfile
    container_name: zachai-fastapi
    ports:
      - "8000:8000"    # API gateway — http://localhost:8000
    environment:
      # Keycloak — internal Docker DNS (NOT localhost:8180 — that's the host mapping)
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      # MinIO — internal client uses minio:9000 (Docker network)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      # Presigned URLs use the externally reachable MinIO endpoint (browsers cannot resolve minio:9000)
      MINIO_PRESIGNED_ENDPOINT: ${MINIO_PRESIGNED_ENDPOINT}
      # PostgreSQL — FastAPI reuses the shared postgres credentials (Story 2.1)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Camunda 7 REST API — internal Docker DNS (Story 2.2)
      CAMUNDA_REST_URL: http://camunda7:8080/engine-rest
      # FFmpeg Worker — audio normalization (Story 2.3)
      FFMPEG_WORKER_URL: http://ffmpeg-worker:8765
      # Golden Set — Story 4.1 (Label Studio webhook + internal ingest)
      LABEL_STUDIO_WEBHOOK_SECRET: ${LABEL_STUDIO_WEBHOOK_SECRET:-changeme-label-studio-webhook}
      GOLDEN_SET_INTERNAL_SECRET: ${GOLDEN_SET_INTERNAL_SECRET:-changeme-golden-set-internal}
      GOLDEN_SET_BUCKET: ${GOLDEN_SET_BUCKET:-golden-set}
      GOLDEN_SET_THRESHOLD: ${GOLDEN_SET_THRESHOLD:-1000}
      # CORS — Story 4.2 (frontend dev port)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    networks:
      - zachai-network
    depends_on:
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      camunda7:
        condition: service_healthy
      ffmpeg-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  camunda7:
    image: camunda/camunda-bpm-platform:run-7.24.0
    container_name: zachai-camunda7
    ports:
      - "8081:8080"    # REST API + Cockpit — http://localhost:8081/camunda/app/cockpit
      - "9404:9404"    # Prometheus metrics
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/camunda
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      WAIT_FOR: postgres:5432
      WAIT_FOR_TIMEOUT: 60
    networks:
      - zachai-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/engine-rest/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Layer 2: Compute & Inference ─────────────────────────────────────────────

  ffmpeg-worker:
    build:
      context: ./workers/ffmpeg-worker
    container_name: zachai-ffmpeg-worker
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    networks:
      - zachai-network
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8765/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped
    # Port 8765 is internal only — NOT mapped to host (architecture.md § 5 — Internal Shield)

  openvino-worker:
    build:
      context: ./workers/openvino-worker
    container_name: zachai-openvino-worker
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MODEL_REGISTRY_BUCKET: ${MODEL_REGISTRY_BUCKET:-models}
      MODEL_POINTER_KEY: ${MODEL_POINTER_KEY:-latest}
      MODEL_POLL_INTERVAL_SECONDS: ${MODEL_POLL_INTERVAL_SECONDS:-60}
      WHISPER_MODEL_CACHE_DIR: ${WHISPER_MODEL_CACHE_DIR:-/var/cache/openvino-models}
      MAX_MODEL_TREE_TOTAL_BYTES: ${MAX_MODEL_TREE_TOTAL_BYTES:-10737418240}
      WHISPER_MODEL_PATH: ${WHISPER_MODEL_PATH}
      OV_DEVICE: ${OV_DEVICE:-CPU}
      INFER_TIMEOUT_SECONDS: ${INFER_TIMEOUT_SECONDS:-900}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - zachai-network
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8770/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped
    # Port 8770 is internal only — NOT mapped to host (architecture.md § 5 — Internal Shield)
    #
    # Story 3.3: registry hot-reload — ensure WHISPER_MODEL_CACHE_DIR is writable (default path is
    # inside the container filesystem). For large IR trees, add a named volume, e.g.:
    #   volumes:
    #     - openvino_model_cache:/var/cache/openvino-models
    #
    # Fallback when models/latest is missing: mount host-exported OpenVINO Whisper IR, e.g.:
    #   volumes:
    #     - ${WHISPER_MODEL_HOST_PATH:?set path to exported model dir}:/models/whisper-base-ov:ro
    # and set WHISPER_MODEL_PATH=/models/whisper-base-ov in .env

  # ── Layer 3: Orchestration Workers (Story 2.2) ──────────────────────────────

  camunda-worker:
    build:
      context: ./workers/camunda-worker
    container_name: zachai-camunda-worker
    environment:
      CAMUNDA_REST_URL: http://camunda7:8080/engine-rest
      LABEL_STUDIO_URL: http://label-studio:8090
      LABEL_STUDIO_API_KEY: ${LABEL_STUDIO_API_KEY:-}
      # DB for project synchronization (Story 2.2)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zachai
      DB_HOST: postgres
    networks:
      - zachai-network
    depends_on:
      camunda7:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[p]rovision_label_studio' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Layer 4: Annotation ───────────────────────────────────────────────────────
  # label-studio:   # TODO: Story 2.1 — Expert Loop annotation. Auto-provisioned per project by Camunda 7.
  #                 #                   Image: heartexlabs/label-studio:latest. Port: 8090.
  #                 #                   Depends on: postgres, minio, fastapi (all service_healthy).

  # ── Layer 5: Collaboration & Intelligence ─────────────────────────────────────
  # hocuspocus:     # TODO: Story 5.1 — CRDT real-time collaboration server (Yjs).
  #                 #                   Port: 1234 (WSS). Depends on: postgres, redis (service_healthy).
  # languagetool:   # TODO: Story 5.5 — Grammar checker. RAM-intensive — cgroups quotas required.
  #                 #                   Image: erikvl87/languagetool:latest. Port: 8010.
  #                 #                   Depends on: (none). Fallback: FastAPI returns 429 + local regex.
  # export-worker:  # TODO: Story 5.4 — DOCX/JSON snapshot exporter (Node.js). Triggered by Hocuspocus webhook.
  #                 #                   Validates SHA-256 checksum before MinIO upload.
  #                 #                   Depends on: minio (service_healthy).

  # ── Layer 6: Frontend (Story 4.2) ─────────────────────────────────────────────
  # Dev mode: run `npm run dev` in src/frontend/ with VITE_API_BASE=http://localhost:8000
  # Docker mode (optional — uncomment to add frontend to compose stack):
  # frontend:
  #   build:
  #     context: ./frontend
  #   container_name: zachai-frontend
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     VITE_API_BASE: http://fastapi:8000
  #     VITE_KEYCLOAK_URL: http://localhost:8180
  #     VITE_KEYCLOAK_REALM: zachai
  #     VITE_KEYCLOAK_CLIENT_ID: zachai-frontend
  #   networks:
  #     - zachai-network
  #   depends_on:
  #     fastapi:
  #       condition: service_healthy

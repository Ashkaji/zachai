# ZachAI — Compose Stack (100% Open-Source, On-Premise)
# ======================================================
# Full startup chain (architecture.md § 6):
#   Layer 0 — Storage:    minio → (minio-init)
#   Layer 1 — Identity:   postgres → keycloak, redis          [Story 1.2 + 5.2]
#   Layer 2 — Compute:    ffmpeg-worker, openvino, camunda7    [TODO: Story 3.1, 3.2, 2.2]
#   Layer 3 — Gateway:    fastapi, camunda-workers             [TODO: Story 1.3, 2.2]
#   Layer 4 — Annotation: label-studio (Story 2.1)
#   Layer 5 — Collab:     hocuspocus (Story 5.1), export-worker (Story 5.4), languagetool (Story 5.5)
#   Layer 6 — Frontend:   frontend                            [TODO: Story (React)]

networks:
  zachai-network:
    driver: bridge

volumes:
  minio_data:
  postgres_data:        # Story 1.2 — shared PostgreSQL instance (keycloak + zachai + camunda DBs)
  redis_data:           # Story 5.2 — WSS tickets + future LanguageTool cache / Hocuspocus
  label_studio_data:    # Label Studio uploads / local media (Story 2.1)

services:

  # ── Layer 0: Storage Foundation ──────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: zachai-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - zachai-network
    healthcheck:
      test: ["CMD", "/usr/bin/mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: zachai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - zachai-network
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/projects
        mc mb --ignore-existing local/golden-set
        mc mb --ignore-existing local/models
        mc mb --ignore-existing local/snapshots
        echo "✅ Buckets initialized: projects, golden-set, models, snapshots"
    deploy:
      resources:
        limits:
          memory: 128M
    restart: "no"

  # ── Layer 1: Identity & Persistence ──────────────────────────────────────────

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: zachai-postgres:16.4-local
    container_name: zachai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zachai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB:-keycloak}\""]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    restart: unless-stopped

  keycloak:
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile
    image: zachai-keycloak:26.1.4-local
    container_name: zachai-keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
      - "9002:9000"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${DB_KC_USER:-keycloak_user}
      KC_DB_PASSWORD: ${DB_KC_PASSWORD:-keycloak_pass}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
    networks:
      - zachai-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: zachai-redis
    volumes:
      - redis_data:/data
    networks:
      - zachai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ── Layer 3: Gateway & Orchestration ─────────────────────────────────────────

  fastapi:
    build:
      context: .
      dockerfile: api/fastapi/Dockerfile
    container_name: zachai-fastapi
    ports:
      - "8000:8000"
    environment:
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_PRESIGNED_ENDPOINT: ${MINIO_PRESIGNED_ENDPOINT}
      # Story 8.1: Scoped DB user
      POSTGRES_USER: ${DB_ZACHAI_USER:-zachai_user}
      POSTGRES_PASSWORD: ${DB_ZACHAI_PASSWORD:-zachai_pass}
      POSTGRES_DB: zachai
      CAMUNDA_REST_URL: http://camunda7:8080/engine-rest
      FFMPEG_WORKER_URL: http://ffmpeg-worker:8765
      LABEL_STUDIO_WEBHOOK_SECRET: ${LABEL_STUDIO_WEBHOOK_SECRET:-changeme-label-studio-webhook}
      GOLDEN_SET_INTERNAL_SECRET: ${GOLDEN_SET_INTERNAL_SECRET:-changeme-golden-set-internal}
      MODEL_READY_CALLBACK_SECRET: ${MODEL_READY_CALLBACK_SECRET:-changeme-model-ready-callback}
      GOLDEN_SET_BUCKET: ${GOLDEN_SET_BUCKET:-golden-set}
      GOLDEN_SET_THRESHOLD: ${GOLDEN_SET_THRESHOLD:-1000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WSS_TICKET_TTL_SEC: ${WSS_TICKET_TTL_SEC:-3600}
      SNAPSHOT_CALLBACK_SECRET: ${SNAPSHOT_CALLBACK_SECRET:-changeme-snapshot-callback}
      EXPORT_WORKER_URL: ${EXPORT_WORKER_URL:-http://export-worker:8780}
      LANGUAGETOOL_URL: ${LANGUAGETOOL_URL:-http://languagetool:8010}
      GRAMMAR_CACHE_TTL_SEC: ${GRAMMAR_CACHE_TTL_SEC:-300}
      GRAMMAR_MAX_TEXT_LEN: ${GRAMMAR_MAX_TEXT_LEN:-65536}
      GRAMMAR_HTTP_TIMEOUT: ${GRAMMAR_HTTP_TIMEOUT:-20}
    networks:
      - zachai-network
    depends_on:
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      camunda7:
        condition: service_healthy
      ffmpeg-worker:
        condition: service_healthy
      export-worker:
        condition: service_healthy
      languagetool:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    restart: unless-stopped

  camunda7:
    image: camunda/camunda-bpm-platform:run-7.24.0
    container_name: zachai-camunda7
    ports:
      - "8081:8080"
      - "9404:9404"
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/camunda
      DB_USERNAME: ${DB_CAMUNDA_USER:-camunda_user}
      DB_PASSWORD: ${DB_CAMUNDA_PASSWORD:-camunda_pass}
      WAIT_FOR: postgres:5432
      WAIT_FOR_TIMEOUT: 60
    networks:
      - zachai-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/engine-rest/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  # ── Layer 2: Compute & Inference ─────────────────────────────────────────────

  ffmpeg-worker:
    build:
      context: ./workers/ffmpeg-worker
    container_name: zachai-ffmpeg-worker
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    networks:
      - zachai-network
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8765/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  openvino-worker:
    build:
      context: ./workers/openvino-worker
    container_name: zachai-openvino-worker
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MODEL_REGISTRY_BUCKET: ${MODEL_REGISTRY_BUCKET:-models}
      MODEL_POINTER_KEY: ${MODEL_POINTER_KEY:-latest}
      MODEL_POLL_INTERVAL_SECONDS: ${MODEL_POLL_INTERVAL_SECONDS:-60}
      WHISPER_MODEL_CACHE_DIR: ${WHISPER_MODEL_CACHE_DIR:-/var/cache/openvino-models}
      MAX_MODEL_TREE_TOTAL_BYTES: ${MAX_MODEL_TREE_TOTAL_BYTES:-10737418240}
      OV_DEVICE: ${OV_DEVICE:-CPU}
      INFER_TIMEOUT_SECONDS: ${INFER_TIMEOUT_SECONDS:-900}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - zachai-network
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8770/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  diarization-worker:
    build:
      context: ./workers/diarization-worker
    container_name: zachai-diarization-worker
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      HF_TOKEN: ${HF_TOKEN:-}
      DIARIZATION_ENGINE: ${DIARIZATION_ENGINE:-pyannote}
      DIARIZATION_DEVICE: ${DIARIZATION_DEVICE:-cpu}
      DIARIZATION_TIMEOUT_SECONDS: ${DIARIZATION_TIMEOUT_SECONDS:-900}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - zachai-network
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8780/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          memory: 1G
    restart: unless-stopped

  label-studio-ml-bridge:
    build:
      context: ./workers/label-studio-ml-bridge
    container_name: zachai-label-studio-ml-bridge
    environment:
      LABEL_STUDIO_URL: ${LABEL_STUDIO_URL:-http://label-studio:8080}
      LABEL_STUDIO_API_KEY: ${LABEL_STUDIO_API_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      OPENVINO_WORKER_URL: ${OPENVINO_WORKER_URL:-http://openvino-worker:8770}
      DIARIZATION_WORKER_URL: ${DIARIZATION_WORKER_URL:-http://diarization-worker:8780}
      DIARIZATION_ENGINE: ${DIARIZATION_ENGINE:-pyannote}
      DIARIZATION_ENABLED: ${DIARIZATION_ENABLED:-true}
      ZACHAI_LS_MINIO_BUCKET: ${ZACHAI_LS_MINIO_BUCKET:-projects}
      ZACHAI_LS_MINIO_KEY_PREFIX: ${ZACHAI_LS_MINIO_KEY_PREFIX:-label-studio-ml/}
      LOG_LEVEL: ${LABEL_STUDIO_ML_LOG_LEVEL:-INFO}
    networks:
      - zachai-network
    depends_on:
      label-studio:
        condition: service_healthy
      minio:
        condition: service_healthy
      openvino-worker:
        condition: service_healthy
      diarization-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ── Layer 3: Orchestration Workers ──────────────────────────────────────────

  camunda-worker:
    build:
      context: ./workers/camunda-worker
    container_name: zachai-camunda-worker
    environment:
      CAMUNDA_REST_URL: http://camunda7:8080/engine-rest
      LABEL_STUDIO_URL: http://label-studio:8080
      LABEL_STUDIO_API_KEY: ${LABEL_STUDIO_API_KEY:-}
      POSTGRES_USER: ${DB_ZACHAI_USER:-zachai_user}
      POSTGRES_PASSWORD: ${DB_ZACHAI_PASSWORD:-zachai_pass}
      POSTGRES_DB: zachai
      DB_HOST: postgres
      ML_BACKEND_URL: ${ML_BACKEND_URL:-http://label-studio-ml-bridge:9090}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      GOLDEN_SET_BUCKET: ${GOLDEN_SET_BUCKET:-golden-set}
      MODEL_REGISTRY_BUCKET: ${MODEL_REGISTRY_BUCKET:-models}
      MODEL_POINTER_KEY: ${MODEL_POINTER_KEY:-latest}
      FASTAPI_INTERNAL_URL: http://fastapi:8000
      MODEL_READY_CALLBACK_SECRET: ${MODEL_READY_CALLBACK_SECRET:-changeme-model-ready-callback}
      LORA_MAX_WER: ${LORA_MAX_WER:-0.02}
      LORA_EVAL_FRACTION: ${LORA_EVAL_FRACTION:-0.2}
      LORA_SPLIT_SEED: ${LORA_SPLIT_SEED:-42}
      LORA_TRAINING_STUB: ${LORA_TRAINING_STUB:-true}
      LORA_STUB_SOURCE_PREFIX: ${LORA_STUB_SOURCE_PREFIX:-whisper-base-ov/}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - zachai-network
    depends_on:
      camunda7:
        condition: service_healthy
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_healthy
      minio:
        condition: service_healthy
      label-studio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[r]un_workers' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ── Layer 4: Annotation ─────────────────────────────────────────────────────

  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: zachai-label-studio
    ports:
      - "8090:8080"
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: labelstudio
      POSTGRE_USER: ${DB_LS_USER:-ls_user}
      POSTGRE_PASSWORD: ${DB_LS_PASSWORD:-ls_pass}
      POSTGRE_HOST: postgres
      POSTGRE_PORT: "5432"
      LABEL_STUDIO_HOST: 0.0.0.0
    volumes:
      - label_studio_data:/label-studio/data
    networks:
      - zachai-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/api/version >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  # ── Layer 5: Collaboration & Intelligence ─────────────────────────────────────

  hocuspocus:
    build:
      context: ./collab/hocuspocus
      dockerfile: Dockerfile
    image: zachai-hocuspocus:local
    container_name: zachai-hocuspocus
    ports:
      - "${HOCUSPOCUS_HOST_PORT:-11234}:1234"
    environment:
      PORT: "1234"
      HOST: "0.0.0.0"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      HOCUSPOCUS_REDIS_PREFIX: ${HOCUSPOCUS_REDIS_PREFIX:-hp:crdt:}
      POSTGRES_USER: ${DB_ZACHAI_USER:-zachai_user}
      POSTGRES_PASSWORD: ${DB_ZACHAI_PASSWORD:-zachai_pass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: zachai
      LOG_LEVEL: ${HOCUSPOCUS_LOG_LEVEL:-info}
      SNAPSHOT_IDLE_MS: ${SNAPSHOT_IDLE_MS:-15000}
      SNAPSHOT_CALLBACK_URL: ${SNAPSHOT_CALLBACK_URL:-http://fastapi:8000/v1/editor/callback/snapshot}
      SNAPSHOT_CALLBACK_SECRET: ${SNAPSHOT_CALLBACK_SECRET:-changeme-snapshot-callback}
    networks:
      - zachai-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('net').createConnection({port:1234,host:'127.0.0.1'},()=>process.exit(0)).on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  languagetool:
    image: erikvl87/languagetool:latest
    container_name: zachai-languagetool
    networks:
      - zachai-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider --timeout=10 http://127.0.0.1:8010/v2/languages || exit 1",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  export-worker:
    build:
      context: ./workers/export-worker
    container_name: zachai-export-worker
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      SNAPSHOT_BUCKET: ${SNAPSHOT_BUCKET:-snapshots}
      SNAPSHOT_CALLBACK_SECRET: ${SNAPSHOT_CALLBACK_SECRET:-changeme-snapshot-callback}
      EXPORT_WORKER_MAX_RETRIES: ${EXPORT_WORKER_MAX_RETRIES:-3}
      EXPORT_WORKER_DLQ_DIR: ${EXPORT_WORKER_DLQ_DIR:-/tmp/export-worker-dlq}
    networks:
      - zachai-network
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8780/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

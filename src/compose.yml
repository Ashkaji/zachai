# ZachAI — Compose Stack (100% Open-Source, On-Premise)
# ======================================================
# Full startup chain (architecture.md § 6):
#   Layer 0 — Storage:    minio → (minio-init)
#   Layer 1 — Identity:   postgres → keycloak, redis          [TODO: Story 1.2, 5.2]
#   Layer 2 — Compute:    ffmpeg-worker, openvino, camunda7    [TODO: Story 3.1, 3.2, 2.2]
#   Layer 3 — Gateway:    fastapi, camunda-workers             [TODO: Story 1.3, 2.2]
#   Layer 4 — Annotation: label-studio                        [TODO: Story 2.1]
#   Layer 5 — Collab:     hocuspocus, languagetool, export-worker [TODO: Story 5.x]
#   Layer 6 — Frontend:   frontend                            [TODO: Story (React)]
#
# SMOKE TEST — run after 'docker compose up -d':
#   docker compose logs -f minio-init          # wait for "Buckets initialized"
#   docker compose exec minio mc alias set local http://localhost:9000 minioadmin minioadmin
#   docker compose exec minio mc ls local/
#   Expected: [date] projects/  golden-set/  models/  snapshots/
#
# Interfaces after startup:
#   MinIO S3 API:      http://localhost:9000
#   MinIO Console:     http://localhost:9001
#   (future services listed as they are added in subsequent stories)

networks:
  zachai-network:
    driver: bridge

volumes:
  minio_data:
  # postgres_data:      # TODO: Story 1.2 (Keycloak depends on postgres)
  # redis_data:         # TODO: Story 5.2 (Hocuspocus + WSS tickets)

services:

  # ── Layer 0: Storage Foundation (Story 1.1) ──────────────────────────────────
  #
  # MinIO is the root of the entire stack — every other service depends on it.
  # It has zero dependencies and starts first. The minio-init service creates
  # the 4 required root buckets once MinIO is healthy.

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    # NOTE: Verify this tag at https://hub.docker.com/r/minio/minio/tags
    # before first deployment and update to the latest stable RELEASE.
    container_name: zachai-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API — used by FastAPI presigned URLs, FFmpeg, OpenVINO
      - "9001:9001"    # Web Console — http://localhost:9001 (dev/ops access)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - zachai-network
    healthcheck:
      test: ["CMD", "/usr/bin/mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: zachai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - zachai-network
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/projects
        mc mb --ignore-existing local/golden-set
        mc mb --ignore-existing local/models
        mc mb --ignore-existing local/snapshots
        echo "✅ Buckets initialized: projects, golden-set, models, snapshots"
    restart: "no"

  # ── Layer 1: Identity & Persistence ──────────────────────────────────────────
  # postgres:       # TODO: Story 1.2 — Single PostgreSQL instance shared by Keycloak (dedicated DB)
  #                 #                   and ZachAI business model (dedicated DB). Depends on: (none).
  # keycloak:       # TODO: Story 1.2 — OIDC/RBAC (Admin, Manager, Transcripteur, Expert roles).
  #                 #                   Image: quay.io/keycloak/keycloak:latest. Port: 8180.
  #                 #                   Depends on: postgres (service_healthy).
  # redis:          # TODO: Story 5.2 — WSS short-lived tickets (TTL 60s) + LanguageTool cache.
  #                 #                   Image: redis:7-alpine. Port: 6379. Depends on: (none).

  # ── Layer 2: Gateway & Orchestration ─────────────────────────────────────────
  # camunda7:       # TODO: Story 2.2 — BPMN orchestration via External Task Workers.
  #                 #                   Image: camunda/camunda-bpm-platform:run-7.24.0.
  #                 #                   Ports: 8080 (REST+Cockpit), 9404 (Prometheus).
  #                 #                   Depends on: postgres (service_healthy). DB: dedicated.
  # fastapi:        # TODO: Story 1.3 — Lean API gateway. Presigned URLs, WSS tickets, Golden Set counter.
  #                 #                   Depends on: keycloak, minio, redis, camunda7 (all service_healthy).
  #                 #                   Port: 8000.

  # ── Layer 2: Compute & Inference ─────────────────────────────────────────────
  # ffmpeg-worker:  # TODO: Story 3.1 — Audio normalization (→ 16kHz mono PCM).
  #                 #                   Depends on: minio (service_healthy).
  # openvino:       # TODO: Story 3.2 — Whisper ASR inference + hot-reload (polls models/latest every 60s).
  #                 #                   Depends on: minio (service_healthy).
  #                 #                   Internal only — NOT exposed publicly.

  # ── Layer 3: Orchestration Workers ───────────────────────────────────────────
  # camunda-workers: # TODO: Story 2.2 — Python External Task Workers (long-polling pattern).
  #                  #                   Depends on: camunda7 (service_healthy), fastapi (service_healthy).

  # ── Layer 4: Annotation ───────────────────────────────────────────────────────
  # label-studio:   # TODO: Story 2.1 — Expert Loop annotation. Auto-provisioned per project by Camunda 7.
  #                 #                   Image: heartexlabs/label-studio:latest. Port: 8090.
  #                 #                   Depends on: postgres, minio, fastapi (all service_healthy).

  # ── Layer 5: Collaboration & Intelligence ─────────────────────────────────────
  # hocuspocus:     # TODO: Story 5.1 — CRDT real-time collaboration server (Yjs).
  #                 #                   Port: 1234 (WSS). Depends on: postgres, redis (service_healthy).
  # languagetool:   # TODO: Story 5.5 — Grammar checker. RAM-intensive — cgroups quotas required.
  #                 #                   Image: erikvl87/languagetool:latest. Port: 8010.
  #                 #                   Depends on: (none). Fallback: FastAPI returns 429 + local regex.
  # export-worker:  # TODO: Story 5.4 — DOCX/JSON snapshot exporter (Node.js). Triggered by Hocuspocus webhook.
  #                 #                   Validates SHA-256 checksum before MinIO upload.
  #                 #                   Depends on: minio (service_healthy).

  # ── Layer 6: Frontend ─────────────────────────────────────────────────────────
  # frontend:       # TODO: Story (React+Tiptap) — "Azure Flow" UX.
  #                 #                   Port: 3000. Depends on: fastapi, hocuspocus (service_healthy).
